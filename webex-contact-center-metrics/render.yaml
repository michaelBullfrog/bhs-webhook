services:
  - type: web
    name: webex-contact-center-metrics
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: APP_NAME
        value: Webex Contact Center Metrics

      - key: ENVIRONMENT
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: WEBEX_CLIENT_ID
        sync: false

      - key: WEBEX_CLIENT_SECRET
        sync: false

      - key: WEBEX_SERVICE_APP_ID
        sync: false

      - key: WEBEX_ACCESS_TOKEN
        sync: false

      - key: WEBEX_REFRESH_TOKEN
        sync: false

      - key: WEBEX_WEBHOOK_SECRET
        generateValue: true

      - key: DATABASE_URL
        sync: false
